name: Deploy to GitHub Pages

# 확장을 GitHub Pages의 고정 HTTPS URL로 배포한다.
# 빌드된 앱(dist/index.html)과 빌드불필요 단일파일(standalone.html)을 둘 다 게시.
#   https://<user>.github.io/<repo>/                → 빌드된 Vite 앱
#   https://<user>.github.io/<repo>/standalone.html → 빌드불필요 단일 HTML
# 둘 중 어느 URL이든 Forma 확장 URL로 등록 가능.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # (cache:npm 제거 — lockfile이 없어 캐시 설정이 실패하므로)
      - run: npm install
      # Vite 앱 빌드(선택). 실패해도 standalone.html은 아래에서 항상 게시.
      - run: npm run build
        continue-on-error: true
      # 빌드불필요 단일파일을 항상 보장(빌드 성공 시 index.html과 공존, 실패 시 단독)
      - run: mkdir -p dist && cp standalone.html dist/standalone.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
