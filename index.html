<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BimOn AI</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; padding: 12px;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #1e1f22; color: #e6e6e6; font-size: 13px;
      }
      h1 { font-size: 14px; margin: 0 0 8px; color: #b18cff; }
      .status { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: #777; }
      .dot.on { background: #3ad07a; }
      .dot.off { background: #e05a5a; }
      #log {
        height: 220px; overflow: auto; background: #141517; border: 1px solid #303236;
        border-radius: 6px; padding: 8px; font-family: "Fira Code", Consolas, monospace;
        font-size: 11px; white-space: pre-wrap; line-height: 1.5;
      }
      .muted { color: #8a8d92; }
    </style>
  </head>
  <body>
    <h1>BimOn AI — Forma MCP</h1>
    <div class="status">
      <span id="dot" class="dot"></span>
      <span id="statusText">Connecting…</span>
    </div>
    <div id="log"></div>
    <p class="muted">이 패널이 열려 있어야 Claude가 Forma를 제어할 수 있습니다.</p>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
